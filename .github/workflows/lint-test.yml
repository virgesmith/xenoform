name: Lint and Test

on:
  push:
    branches: [ main ]
    tags: '**'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14", "3.14t"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v6
    - name: "Setup uv ${{ matrix.python-version }} / ${{ matrix.os }}"
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}
    - name: Build
      run: uv sync --dev --all-extras
    - name: Lint
      run: |
        uv run ruff check
        uv run ty check
    # Coverage is enforced on exactly one job (3.14 / ubuntu-latest) so the cost is paid once,
    # and on a clean checkout (`ext/` is gitignored, so a fresh clone has no pre-built modules)
    # so every build/caching branch is exercised. Other jobs run plain pytest without coverage.
    - name: Test
      if: matrix.python-version != '3.14' || matrix.os != 'ubuntu-latest'
      run: uv run pytest -sv --no-cov
    - name: Test with coverage
      if: matrix.python-version == '3.14' && matrix.os == 'ubuntu-latest'
      run: uv run pytest -sv --cov-fail-under=100
    - name: Run examples
      run: |
        uv run examples/loop.py
        uv run examples/distance_matrix.py
